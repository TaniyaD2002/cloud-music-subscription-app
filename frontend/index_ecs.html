<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Subscription App</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
  header { background: #1a1a2e; color: #fff; padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; }
  header h1 { font-size: 1.4rem; }
  #logout-btn { background: none; border: 1px solid #fff; color: #fff; padding: .4rem 1rem; cursor: pointer; border-radius: 4px; }
  main { max-width: 960px; margin: 2rem auto; padding: 0 1rem; }
  section { background: #fff; border-radius: 8px; padding: 1.5rem; margin-bottom: 1.5rem; box-shadow: 0 1px 4px rgba(0,0,0,.1); }
  section h2 { margin-bottom: 1rem; font-size: 1.1rem; color: #1a1a2e; }
  .form-row { display: flex; gap: .75rem; flex-wrap: wrap; margin-bottom: .75rem; }
  .form-row input { flex: 1; min-width: 140px; padding: .5rem; border: 1px solid #ccc; border-radius: 4px; }
  button.primary { background: #1a1a2e; color: #fff; border: none; padding: .5rem 1.2rem; border-radius: 4px; cursor: pointer; }
  .error { color: red; margin-top: .5rem; font-size: .9rem; }
  .success { color: green; margin-top: .5rem; font-size: .9rem; }
  .song-card { display: flex; align-items: center; gap: 1rem; padding: .75rem 0; border-bottom: 1px solid #eee; }
  .song-card img { width: 60px; height: 60px; object-fit: cover; border-radius: 4px; }
  .song-info { flex: 1; }
  .song-info strong { display: block; }
  .song-info span { font-size: .85rem; color: #666; }
  button.remove { background: #c0392b; color: #fff; border: none; padding: .3rem .8rem; border-radius: 4px; cursor: pointer; }
  button.subscribe { background: #27ae60; color: #fff; border: none; padding: .3rem .8rem; border-radius: 4px; cursor: pointer; }
  .auth-wrapper { display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #1a1a2e; }
  .auth-box { background: #fff; padding: 2rem; border-radius: 8px; width: 340px; }
  .auth-box h2 { margin-bottom: 1.2rem; text-align: center; color: #1a1a2e; }
  .auth-box input { width: 100%; padding: .6rem; margin-bottom: .8rem; border: 1px solid #ccc; border-radius: 4px; }
  .auth-box button { width: 100%; }
  .auth-box p { margin-top: .8rem; text-align: center; font-size: .9rem; }
  .auth-box a { color: #1a1a2e; cursor: pointer; }
  #app { display: none; }
  #auth { display: block; }
</style>
</head>
<body>
<div id="auth">
  <div id="login-page" class="auth-wrapper">
    <div class="auth-box">
      <h2>Login</h2>
      <input id="login-email" type="email" placeholder="Email">
      <input id="login-password" type="password" placeholder="Password">
      <button class="primary" onclick="doLogin()">Login</button>
      <div id="login-error" class="error"></div>
      <p>No account? <a onclick="showRegister()">Register</a></p>
    </div>
  </div>
  <div id="register-page" class="auth-wrapper" style="display:none">
    <div class="auth-box">
      <h2>Register</h2>
      <input id="reg-email" type="email" placeholder="Email">
      <input id="reg-username" type="text" placeholder="Username">
      <input id="reg-password" type="password" placeholder="Password">
      <button class="primary" onclick="doRegister()">Register</button>
      <div id="reg-error" class="error"></div>
      <div id="reg-success" class="success"></div>
      <p>Have account? <a onclick="showLogin()">Login</a></p>
    </div>
  </div>
</div>
<div id="app">
  <header>
    <h1>Music Subscription App</h1>
    <div>Welcome, <strong id="username-display"></strong>
    <button id="logout-btn" onclick="doLogout()">Logout</button></div>
  </header>
  <main>
    <section><h2>User Area</h2><p>Logged in as: <strong id="user-area-name"></strong></p></section>
    <section><h2>My Subscriptions</h2><div id="subscription-list"><em>No subscriptions yet.</em></div></section>
    <section>
      <h2>Query Music</h2>
      <div class="form-row">
        <input id="q-title" placeholder="Title">
        <input id="q-year" placeholder="Year">
        <input id="q-artist" placeholder="Artist">
        <input id="q-album" placeholder="Album">
      </div>
      <button class="primary" onclick="doQuery()">Query</button>
      <div id="query-message" class="error" style="margin-top:.5rem"></div>
      <div id="query-results" style="margin-top:1rem"></div>
    </section>
  </main>
</div>
<script>
const API_BASE = "http://100.54.118.80";
let currentUser = null;
let currentEmail = null;
const songs = {};

async function apiFetch(path, opts) {
  opts = opts || {};
  const res = await fetch(API_BASE + path, Object.assign({}, opts, {headers: {"Content-Type": "application/json"}}));
  const data = await res.json().catch(function() { return {}; });
  return {status: res.status, data: data};
}

async function doLogin() {
  var email    = document.getElementById("login-email").value.trim();
  var password = document.getElementById("login-password").value.trim();
  if (!email || !password) {
    document.getElementById("login-error").textContent = "All fields are required.";
    return;
  }
  var r = await apiFetch
  if (r.status === 200) {
    currentUser = r.data.user_name || email;
    currentEmail = r.data.email || email;
    showApp();
  } else {
    document.getElementById("login-error").textContent = r.data.error || "Login failed";
  }
}

async function doRegister() {
  var email     = document.getElementById("reg-email").value.trim();
  var user_name = document.getElementById("reg-username").value.trim();
  var password  = document.getElementById("reg-password").value.trim();
  if (!email || !user_name || !password) {
    document.getElementById("reg-error").textContent = "All fields are required.";
    return;
  }
  var emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
  if (!emailRegex.test(email)) {
    document.getElementById("reg-error").textContent = "Please enter a valid email address.";
    return;
  }
  var r = await apiFetch("/register", {method: "POST", body: JSON.stringify({email: email, user_name: user_name, password: password})});
  document.getElementById("reg-error").textContent = r.status !== 201 ? ((r.data && r.data.error) || "Error") : "";
  document.getElementById("reg-success").textContent = r.status === 201 ? "Registered! Please login." : "";
  if (r.status === 201) setTimeout(showLogin, 1500);
}

async function doLogout() {
  await apiFetch("/logout", {method: "POST", body: JSON.stringify({})});
  currentUser = null; currentEmail = null;
  showLogin();
}

async function loadSubscriptions() {
  var r = await apiFetch("/subscriptions?email=" + encodeURIComponent(currentEmail));
  var el = document.getElementById("subscription-list");
  if (!r.data.songs || r.data.songs.length === 0) { el.innerHTML = "<em>No subscriptions yet.</em>"; return; }
  el.innerHTML = r.data.songs.map(function(s, i) {
    var key = "sub" + i; songs[key] = s;
    return makeCard(s, "remove", key);
  }).join("");
}

async function doQuery() {
  var title = document.getElementById("q-title").value.trim();
  var year = document.getElementById("q-year").value.trim();
  var artist = document.getElementById("q-artist").value.trim();
  var album = document.getElementById("q-album").value.trim();
  var p = new URLSearchParams();
  if (title) p.set("title", title);
  if (year) p.set("year", year);
  if (artist) p.set("artist", artist);
  if (album) p.set("album", album);
  var r = await apiFetch("/music/query?" + p.toString());
  var msg = document.getElementById("query-message");
  var res = document.getElementById("query-results");
  if (r.data.message && (!r.data.songs || r.data.songs.length === 0)) {
    msg.textContent = r.data.message; res.innerHTML = "";
  } else {
    msg.textContent = "";
    res.innerHTML = (r.data.songs || []).map(function(s, i) {
      var key = "qr" + i; songs[key] = s;
      return makeCard(s, "subscribe", key);
    }).join("");
  }
}

async function doSubscribe(key) {
  var s = songs[key]; if (!s) return;
  await apiFetch("/subscriptions", {method: "POST", body: JSON.stringify({email: currentEmail, title: s.title, artist: s.artist, album: s.album, image_url: s.image_url || "", year: s.year || ""})});
  loadSubscriptions();
}

async function doRemove(key) {
  var s = songs[key]; if (!s) return;
  await apiFetch("/subscriptions", {method: "DELETE", body: JSON.stringify({email: currentEmail, title: s.title, artist: s.artist, album: s.album})});
  loadSubscriptions();
}

function makeCard(s, action, key) {
  var img = s.presigned_image_url || s.image_url || "";
  var btn = action === "remove"
    ? "<button class='remove' onclick='doRemove(\"" + key + "\")'>Remove</button>"
    : "<button class='subscribe' onclick='doSubscribe(\"" + key + "\")'>Subscribe</button>";
  return "<div class='song-card'><img src='" + img + "' onerror='this.src=\"https://placehold.co/60x60\"'>" +
    "<div class='song-info'><strong>" + s.title + "</strong><span>" + s.artist + " - " + s.album + " - " + s.year + "</span></div>" + btn + "</div>";
}

function showApp() {
  document.getElementById("auth").style.display = "none";
  document.getElementById("app").style.display = "block";
  document.getElementById("username-display").textContent = currentUser;
  document.getElementById("user-area-name").textContent = currentUser;
  document.getElementById("q-title").value = "";
  document.getElementById("q-year").value = "";
  document.getElementById("q-artist").value = "";
  document.getElementById("q-album").value = "";
  document.getElementById("query-results").innerHTML = "";
  document.getElementById("query-message").textContent = "";
  loadSubscriptions();
}

function showLogin() {
  document.getElementById("auth").style.display = "block";
  document.getElementById("app").style.display = "none";
  document.getElementById("login-page").style.display = "flex";
  document.getElementById("register-page").style.display = "none";
  document.getElementById("login-error").textContent = "";
  document.getElementById("q-title").value = "";
  document.getElementById("q-year").value = "";
  document.getElementById("q-artist").value = "";
  document.getElementById("q-album").value = "";
  document.getElementById("query-results").innerHTML = "";
  document.getElementById("query-message").textContent = "";
  document.getElementById("subscription-list").innerHTML = "<em>No subscriptions yet.</em>";
}

function showRegister() {
  document.getElementById("login-page").style.display = "none";
  document.getElementById("register-page").style.display = "flex";
  document.getElementById("reg-error").textContent = "";
  document.getElementById("reg-success").textContent = "";
}
</script>
</body>
</html>
